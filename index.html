<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MS-DOS 6.22</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
  }
  #dos-root {
    font-family: 'Share Tech Mono', monospace;
    background: #000;
    color: #aaa;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 12px;
    font-size: 13px;
    line-height: 1.5;
    position: relative;
    overflow: hidden;
  }
  .scanlines {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 3px,
      rgba(0,0,0,0.15) 3px, rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 10;
  }
  #screen {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    position: relative;
    z-index: 1;
    scrollbar-width: none;
    -ms-overflow-style: none;
    word-break: break-word;
  }
  #screen::-webkit-scrollbar { display: none; }
  .line { min-height: 1.5em; }
  #input-row {
    display: flex;
    align-items: center;
    padding-top: 4px;
    position: relative;
    z-index: 1;
    flex-shrink: 0;
  }
  #prompt { color: #33ff33; white-space: nowrap; }
  #cmd-input {
    background: transparent;
    border: none;
    outline: none;
    color: #33ff33;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    flex: 1;
    caret-color: #33ff33;
    margin-left: 2px;
    -webkit-appearance: none;
    border-radius: 0;
  }
  .green { color: #33ff33; }
  .bright { color: #ffffff; }
  .yellow { color: #ffff33; }
  .cyan { color: #33ffff; }
  .red { color: #ff4444; }
  .gray { color: #888; }
  .hidden { display: none; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
</style>
</head>
<body>
<div id="dos-root">
  <div class="scanlines"></div>
  <div id="screen"></div>
  <div id="input-row" class="hidden">
    <span id="prompt" class="green">C:\>&nbsp;</span>
    <input id="cmd-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" maxlength="60" enterkeyhint="send">
  </div>
</div>
 
<script>
const screen = document.getElementById('screen');
const inputRow = document.getElementById('input-row');
const cmdInput = document.getElementById('cmd-input');
 
function line(html) {
  const d = document.createElement('div');
  d.className = 'line';
  d.innerHTML = html || '&nbsp;';
  screen.appendChild(d);
  screen.scrollTop = screen.scrollHeight;
  return d;
}
 
function clr() { screen.innerHTML = ''; }
 
const bootSeq = [
  { t: 0,    html: '<span class="bright">MS-DOS Version 6.22</span>' },
  { t: 300,  html: '<span class="gray">Copyright (C) Microsoft Corp 1981-1994</span>' },
  { t: 500,  html: '&nbsp;' },
  { t: 600,  html: 'Loading HIMEM.SYS ...<span class="green"> OK</span>' },
  { t: 900,  html: 'Loading EMM386.EXE ...<span class="green"> OK</span>' },
  { t: 1100, html: 'Loading MOUSE.COM ...<span class="green"> OK</span>' },
  { t: 1300, html: '&nbsp;' },
  { t: 1400, html: '<span class="yellow">640K</span> conventional memory' },
  { t: 1550, html: '<span class="yellow">15360K</span> extended (XMS) memory' },
  { t: 1700, html: '&nbsp;' },
  { t: 1800, html: 'Starting <span class="bright">MS-DOS</span>...' },
  { t: 2200, html: '&nbsp;' },
  { t: 2400, html: '&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608; <span class="green">100%</span>' },
  { t: 2800, html: '&nbsp;' },
  { t: 3000, html: '<span class="cyan">&#9556;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9559;</span>' },
  { t: 3050, html: '<span class="cyan">&#9553;</span>  <span class="bright">WITAJ W SYSTEMIE DOS!</span>    <span class="cyan">&#9553;</span>' },
  { t: 3100, html: '<span class="cyan">&#9553;</span>  <span class="gray">Wpisz HELP aby zobaczyc</span>   <span class="cyan">&#9553;</span>' },
  { t: 3150, html: '<span class="cyan">&#9553;</span>  <span class="gray">dostepne komendy.</span>          <span class="cyan">&#9553;</span>' },
  { t: 3200, html: '<span class="cyan">&#9562;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9565;</span>' },
  { t: 3300, html: '&nbsp;' },
];
 
bootSeq.forEach(({t, html}) => setTimeout(() => line(html), t));
 
setTimeout(() => {
  inputRow.classList.remove('hidden');
  cmdInput.focus();
}, 3500);
 
const cmds = {
  help: () => [
    '&nbsp;',
    '<span class="yellow">Dostepne komendy:</span>',
    '&nbsp;',
    '  <span class="bright">DIR</span>    - zawartosc dysku',
    '  <span class="bright">VER</span>    - wersja systemu',
    '  <span class="bright">TIME</span>   - aktualny czas',
    '  <span class="bright">DATE</span>   - aktualna data',
    '  <span class="bright">SNAKE</span>  - zagraj w weza',
    '  <span class="bright">POEM</span>   - wiersz o dyskietce',
    '  <span class="bright">FORMAT</span> - formatuj <span class="red">(NIEBEZPIECZNE!)</span>',
    '  <span class="bright">CLS</span>    - wyczysc ekran',
    '  <span class="bright">HELP</span>   - ta pomoc',
    '&nbsp;',
  ],
  dir: () => {
    const now = new Date();
    const d = now.toLocaleDateString('pl-PL');
    const t = now.toLocaleTimeString('pl-PL', {hour:'2-digit',minute:'2-digit'});
    return [
      '&nbsp;',
      ' Katalog C:\\DOS',
      '&nbsp;',
      ` ${d}  ${t}  &lt;DIR&gt;  .`,
      ` ${d}  ${t}  &lt;DIR&gt;  ..`,
      ` ${d}  ${t}  1474560  DYSKIETKA.NFC`,
      ` ${d}  ${t}   65536  COMMAND.COM`,
      ` ${d}  ${t}   32768  AUTOEXEC.BAT`,
      ` ${d}  ${t} 12648430  SEKRET.TXT`,
      '&nbsp;',
      '  4 plik(i)   <span class="yellow">14 221 294</span> bajtow',
      '  2 katalog(i)  <span class="green">349 524 992</span> bajtow wolnych',
      '&nbsp;',
    ];
  },
  ver: () => [
    '&nbsp;',
    'MS-DOS Version <span class="bright">6.22</span>',
    'Hardware: <span class="yellow">DYSKIETKA 3.5" (druk 3D)</span>',
    'Tag NFC: <span class="cyan">NTAG213 - 144 bajty</span>',
    '&nbsp;',
  ],
  time: () => {
    const t = new Date().toLocaleTimeString('pl-PL');
    return ['&nbsp;', `Aktualny czas: <span class="bright">${t}</span>`, '&nbsp;'];
  },
  date: () => {
    const days = ['Niedziela','Poniedzialek','Wtorek','Sroda','Czwartek','Piatek','Sobota'];
    const now = new Date();
    return ['&nbsp;', `Dzisiaj: <span class="bright">${days[now.getDay()]}, ${now.toLocaleDateString('pl-PL')}</span>`, '&nbsp;'];
  },
  poem: () => [
    '&nbsp;',
    '<span class="cyan">&#9556;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9559;</span>',
    '<span class="cyan">&#9553;</span>  <span class="yellow">ODA DO DYSKIETKI</span>        <span class="cyan">&#9553;</span>',
    '<span class="cyan">&#9560;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9552;&#9563;</span>',
    '&nbsp;',
    '  Mala, czarna, 1.44 MB,',
    '  nosilam systemy i gry.',
    '  Dzis z NFC w srodku tkwie,',
    '  w XXI wiek patrze zla.',
    '&nbsp;',
  ],
};
 
let formatStep = 0;
let snakeActive = false;
 
cmdInput.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const raw = cmdInput.value.trim();
  const cmd = raw.toLowerCase();
  cmdInput.value = '';
 
  line(`<span class="green">C:\\&gt;</span> <span class="bright">${raw || '&nbsp;'}</span>`);
  if (!cmd) return;
 
  if (cmd === 'cls') { clr(); return; }
 
  if (cmd === 'format') {
    formatStep = 1;
    line('&nbsp;');
    line('<span class="red">OSTRZEZENIE: Formatowanie zniszczy dane!</span>');
    line('Wpisz <span class="bright">TAK</span> lub <span class="bright">NIE</span>:');
    return;
  }
 
  if (formatStep === 1) {
    if (cmd === 'tak') {
      formatStep = 0;
      line('&nbsp;');
      line('Formatowanie A: ...');
      setTimeout(() => line('&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9608;&#9617;&#9617;&#9617;&#9617;&#9617;&#9617;&#9617;&#9617;&#9617;&#9617; 50%'), 600);
      setTimeout(() => {
        line('<span class="red">BLAD: Dyskietka jest LEGENDARNA!</span>');
        line('<span class="yellow">FORMAT przerwany. System OK.</span>');
        line('&nbsp;');
      }, 1400);
    } else {
      formatStep = 0;
      line('Anulowano.'); line('&nbsp;');
    }
    return;
  }
 
  if (cmd === 'snake') { startSnake(); return; }
 
  const fn = cmds[cmd];
  if (fn) {
    fn().forEach(h => line(h));
  } else {
    line('&nbsp;');
    line(`Nieznana komenda: <span class="red">${raw}</span>`);
    line('Wpisz <span class="bright">HELP</span>');
    line('&nbsp;');
  }
});
 
function startSnake() {
  line('&nbsp;');
  line('<span class="yellow">Uruchamianie SNAKE.EXE...</span>');
  line('<span class="gray">WASD lub strzalki | Q = wyjscie</span>');
  line('&nbsp;');
 
  setTimeout(() => {
    snakeActive = true;
    const W = 18, H = 10;
    let snake = [{x:9,y:5},{x:8,y:5},{x:7,y:5}];
    let dir = {x:1,y:0};
    let food = {x:14,y:3};
    let score = 0;
    let alive = true;
 
    function randFood() {
      let pos;
      do { pos = {x:Math.floor(Math.random()*W), y:Math.floor(Math.random()*H)}; }
      while (snake.some(s=>s.x===pos.x&&s.y===pos.y));
      return pos;
    }
 
    const container = document.createElement('div');
    const scoreEl = document.createElement('div');
    scoreEl.innerHTML = '<span class="cyan">Wynik: </span><span id="snk-score" class="bright">0</span>';
    container.appendChild(scoreEl);
    const grid = document.createElement('div');
    grid.style.cssText = 'border:1px solid #555;display:inline-block;margin-top:2px;line-height:1.2;';
    container.appendChild(grid);
 
    const dpad = document.createElement('div');
    dpad.style.cssText = 'margin-top:8px;display:grid;grid-template-columns:repeat(3,36px);gap:3px;';
    const btns = [
      {label:'&#8593;',r:0,c:1,dx:0,dy:-1},
      {label:'&#8592;',r:1,c:0,dx:-1,dy:0},
      {label:'&#8595;',r:1,c:1,dx:0,dy:1},
      {label:'&#8594;',r:1,c:2,dx:1,dy:0},
      {label:'Q',r:0,c:2,dx:null},
    ];
    btns.forEach(b => {
      const btn = document.createElement('button');
      btn.innerHTML = b.label;
      btn.style.cssText = 'width:36px;height:36px;background:#111;color:#33ff33;border:1px solid #555;font-family:inherit;font-size:16px;cursor:pointer;grid-row:'+(b.r+1)+';grid-column:'+(b.c+1)+';';
      btn.addEventListener('click', () => {
        if(b.dx===null){alive=false;snakeActive=false;line('Wyjscie z gry.');line('&nbsp;');return;}
        const nd={x:b.dx,y:b.dy};
        if(nd.x!==-dir.x||nd.y!==-dir.y) dir=nd;
      });
      dpad.appendChild(btn);
    });
    container.appendChild(dpad);
    screen.appendChild(container);
 
    function render() {
      let html = '';
      for(let y=0;y<H;y++){
        for(let x=0;x<W;x++){
          if(snake[0].x===x&&snake[0].y===y) html+='<span class="bright">@</span>';
          else if(snake.some(s=>s.x===x&&s.y===y)) html+='<span class="green">*</span>';
          else if(food.x===x&&food.y===y) html+='<span class="red">o</span>';
          else html+='<span class="gray">.</span>';
        }
        html+='<br>';
      }
      grid.innerHTML = html;
      const sc = document.getElementById('snk-score');
      if(sc) sc.textContent = score;
      screen.scrollTop = screen.scrollHeight;
    }
 
    function step() {
      if(!alive) return;
      const head={x:snake[0].x+dir.x, y:snake[0].y+dir.y};
      if(head.x<0||head.x>=W||head.y<0||head.y>=H||snake.some(s=>s.x===head.x&&s.y===head.y)){
        alive=false; snakeActive=false;
        grid.innerHTML+='<br><span class="red">GAME OVER!</span> Wynik: <span class="bright">'+score+'</span><br>';
        line('&nbsp;');
        return;
      }
      snake.unshift(head);
      if(head.x===food.x&&head.y===food.y){score++;food=randFood();}
      else snake.pop();
      render();
      setTimeout(step,200);
    }
 
    document.addEventListener('keydown', function snkKey(e) {
      if(!snakeActive){document.removeEventListener('keydown',snkKey);return;}
      const map={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},
        w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0}};
      if(map[e.key]){
        const nd=map[e.key];
        if(nd.x!==-dir.x||nd.y!==-dir.y) dir=nd;
        e.preventDefault();
      }
      if(e.key==='q'||e.key==='Q'){alive=false;snakeActive=false;line('Wyjscie.');line('&nbsp;');document.removeEventListener('keydown',snkKey);}
    });
 
    render();
    setTimeout(step,300);
  }, 600);
}
 
document.getElementById('dos-root').addEventListener('click', () => cmdInput.focus());
</script>
</body>
</html>
